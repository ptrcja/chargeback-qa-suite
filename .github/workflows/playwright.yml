name: Playwright Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      - name: Start mock server
        run: node mockoon/server.js &

      - name: Wait for mock server to be ready
        run: sleep 2

      - name: Run Playwright tests
        id: run_tests
        run: npx playwright test 2>&1 | tee test-output.txt; exit ${PIPESTATUS[0]}
        continue-on-error: true

      - name: Notify triage agent on failure
        if: steps.run_tests.outcome == 'failure'
        run: |
          FAILURE=$(cat test-output.txt | tail -50 | jq -Rs .)
          curl -X POST ${{ secrets.N8N_WEBHOOK_URL }} \
            -H "Content-Type: application/json" \
            -d "{
              \"testName\": \"Playwright test suite\",
              \"error\": $FAILURE,
              \"repo\": \"chargeback-qa-suite\",
              \"branch\": \"${{ github.ref_name }}\",
              \"commit\": \"${{ github.sha }}\"
            }"

      - name: Fail pipeline if tests failed
        if: steps.run_tests.outcome == 'failure'
        run: exit 1

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30