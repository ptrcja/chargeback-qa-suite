name: Playwright Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Start Mockoon server
        run: npx @mockoon/cli@latest start --data mockoon/chargeback-qa-suite.json --port 3001 &

      - name: Wait for Mockoon to be ready
        run: npx wait-on http://localhost:3001/v2/payments/tr_44aKxzEbr8/chargebacks/chb_n9z0tp --timeout 15000

      - name: Run Playwright tests
        run: npx playwright test

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30