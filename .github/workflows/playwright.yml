name: Playwright Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      - name: Start mock server
        run: node mockoon/server.js &

      - name: Wait for mock server to be ready
        run: sleep 2

      - name: Run Playwright tests
        id: run_tests
        run: npx playwright test 2>&1 | tee test-output.txt; exit ${PIPESTATUS[0]}
        continue-on-error: true

      - name: Notify triage agent on failure
        if: steps.run_tests.outcome == 'failure'
        run: |
          FAILURE=$(cat test-output.txt | tail -80 | jq -Rs .)

          # Extract failed test names from output
          FAILED_TESTS=$(grep -E "^\s+[✘×]|FAILED" test-output.txt | head -10 | jq -Rs .)

          # Extract browser info from failures
          BROWSERS=$(grep -oE "\[chromium\]|\[firefox\]|\[webkit\]" test-output.txt | sort -u | tr '\n' ', ' | sed 's/,$//' | jq -Rs .)

          # Get summary line (e.g. "3 failed, 12 passed")
          SUMMARY=$(grep -E "^\s*\d+ (failed|passed)" test-output.txt | tail -1 | jq -Rs .)

          curl -X POST ${{ secrets.N8N_WEBHOOK_URL }} \
            -H "Content-Type: application/json" \
            -d "{
              \"testName\": \"Playwright test suite\",
              \"error\": $FAILURE,
              \"failedTests\": $FAILED_TESTS,
              \"browsers\": $BROWSERS,
              \"summary\": $SUMMARY,
              \"repo\": \"chargeback-qa-suite\",
              \"owner\": \"ptrcja\",
              \"branch\": \"${{ github.ref_name }}\",
              \"commit\": \"${{ github.sha }}\",
              \"runUrl\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
              \"nodeVersion\": \"22\",
              \"os\": \"ubuntu-latest\"
            }"

      - name: Fail pipeline if tests failed
        if: steps.run_tests.outcome == 'failure'
        run: exit 1

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30